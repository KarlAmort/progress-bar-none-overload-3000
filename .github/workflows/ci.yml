name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test

  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Run benchmark suite
        env:
          BENCH_JSON: "1"
          BENCH_JSON_PATH: tmp/benchmark_ci_ruby4.json
          TERM: xterm-256color
          TERM_PROGRAM: github-actions
        run: bundle exec rake benchmark

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-ci-ruby4
          path: tmp/benchmark_ci_ruby4.json

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Run linters
        run: bundle exec rake lint
